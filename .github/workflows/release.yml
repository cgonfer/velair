name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package-release:
    name: Package release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run backend tests
        run: python -m unittest discover -s tests

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm run test

      - name: Check TypeScript
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build release frontend bundle
        working-directory: frontend
        run: npm run build:release

      - name: Read release version
        id: version
        run: |
          VERSION="$(node -p "require('./custom_components/velair/manifest.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          EXPECTED_TAG="v${{ steps.version.outputs.version }}"
          if [ "$GITHUB_REF_NAME" != "$EXPECTED_TAG" ]; then
            echo "Tag $GITHUB_REF_NAME does not match manifest version $EXPECTED_TAG"
            exit 1
          fi

      - name: Package release assets
        run: python .github/scripts/package_release.py

      - name: Upload packaged release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: velair-release-${{ steps.version.outputs.version }}
          path: .release/artifacts/*.zip
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --title "Velair ${{ steps.version.outputs.version }}" \
              --notes "Release artifacts are attached below. Install through HACS when possible, or use the custom component zip for manual installation."
          fi
          gh release upload "$GITHUB_REF_NAME" .release/artifacts/*.zip --clobber
