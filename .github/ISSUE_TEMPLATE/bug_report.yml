name: Bug report
description: Report a reproducible problem with Velair.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. Please include enough detail to reproduce it locally.
  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: "2026.5.0"
    validations:
      required: true
  - type: input
    id: velair-version
    attributes:
      label: Velair version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - HACS custom repository
        - Manual installation
        - Development checkout
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the visible behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Velair
        2. Select ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant Home Assistant logs or browser console errors.
      render: text
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Add screenshots when the issue is visual or interaction related.
